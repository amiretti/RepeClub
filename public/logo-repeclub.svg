<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">REPE CLUB</title>
  <desc id="logoDesc">Text-only square logo with REPE in sky blue and CLUB in white.</desc>

  <defs>
    <linearGradient id="bg" x1="40" y1="40" x2="472" y2="472" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="472" height="472" rx="100" fill="url(#bg)"/>
  <rect x="20" y="20" width="472" height="472" rx="100" stroke="#334155" stroke-width="2"/>

  <text x="256" y="235" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="128" letter-spacing="4" fill="#38BDF8">REPE</text>
  <text x="256" y="340" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="128" letter-spacing="4" fill="#FFFFFF">CLUB</text>
</svg>
