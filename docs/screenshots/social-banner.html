<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RepeClub Banner</title>
  <style>
    :root {
      --sky-1: #a7d8ff;
      --sky-2: #6bbcff;
      --blue-1: #0b3f7a;
      --blue-2: #0f5da8;
      --ink: #0f2640;
      --gold: #f6b40e;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 1200px;
      height: 630px;
      font-family: "Segoe UI", "Trebuchet MS", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.75), transparent 35%),
        radial-gradient(circle at 80% 10%, rgba(255,255,255,0.7), transparent 28%),
        linear-gradient(135deg, var(--sky-1) 0%, #d9efff 45%, var(--white) 100%);
      overflow: hidden;
    }

    .canvas {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 48px 56px;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 26px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: 0.4px;
      background: rgba(255,255,255,0.86);
      color: var(--blue-2);
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(11,63,122,0.12);
      box-shadow: 0 8px 24px rgba(11,63,122,0.12);
      width: fit-content;
      margin-bottom: 20px;
      font-size: 19px;
    }

    .title {
      font-size: 68px;
      line-height: 0.95;
      font-weight: 900;
      color: #082948;
      text-wrap: balance;
      max-width: 640px;
      margin-bottom: 18px;
      text-shadow: 0 2px 0 rgba(255,255,255,0.45);
    }

    .subtitle {
      font-size: 29px;
      line-height: 1.18;
      font-weight: 700;
      color: #1b4f83;
      max-width: 620px;
      margin-bottom: 24px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 11px;
      max-width: 640px;
    }

    .chip {
      font-size: 20px;
      font-weight: 800;
      color: var(--blue-1);
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(15,93,168,0.2);
      border-radius: 999px;
      padding: 8px 15px;
      box-shadow: 0 8px 18px rgba(15,93,168,0.12);
      backdrop-filter: blur(1px);
    }

    .shots {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      position: absolute;
      width: 468px;
      border-radius: 24px;
      border: 4px solid rgba(255,255,255,0.9);
      box-shadow: 0 24px 36px rgba(11,63,122,0.22);
      overflow: hidden;
      background: #fff;
    }

    .card img {
      width: 100%;
      display: block;
    }

    .card.back {
      transform: rotate(-7deg) translate(-28px, 56px);
      opacity: 0.96;
      filter: saturate(0.92);
    }

    .card.front {
      transform: rotate(5deg) translate(66px, -62px);
    }

    .sun {
      position: absolute;
      width: 152px;
      height: 152px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffd867 0%, var(--gold) 72%);
      right: -36px;
      top: -36px;
      box-shadow: 0 0 0 10px rgba(255, 214, 103, 0.28), 0 20px 40px rgba(246, 180, 14, 0.4);
    }

    .corner {
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(11,63,122,0.18), rgba(11,63,122,0));
      left: -120px;
      bottom: -120px;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div>
      <div class="badge">⚽ RepeClub 2026</div>
      <h1 class="title">Completa tu album, conecta y canjea</h1>
      <p class="subtitle">La app para marcar tus figus, detectar repes y cerrar canjes al toque.</p>
      <div class="chips">
        <span class="chip">📘 Coleccion</span>
        <span class="chip">🤝 Canjes</span>
        <span class="chip">☁️ Firebase + Local</span>
      </div>
    </div>

    <div class="shots">
      <div class="card back">
        <img src="./album-view.png" alt="Vista coleccion" />
      </div>
      <div class="card front">
        <img src="./canjes-view.png" alt="Vista canjes" />
      </div>
    </div>

    <div class="sun"></div>
    <div class="corner"></div>
  </div>
</body>
</html>
